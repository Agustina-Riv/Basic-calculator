<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styless.css">
        <title>Calculadora</title>
    </head>

    <body>
        <button id="boton-oscuro">Cambiar modo</button>
        <main class="calculator">
            <h1>Calculadora</h1>

            <section class="calculator-panel" aria-label="calculadora simple">
                <output class="calculator-display">0</output>
                <div class="calculator-keypad"></div>
            </section>

            <section class="history" aria-label="historial">
                <p>Historial</p>
                <p class="history-display"></p>
            </section>
        </main>

        <script src="script.js"></script>
    </body>

</html>
